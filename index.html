    <div class="container">

        <div class="input-group">
            <label for="sn">路由器 SN 号</label>
            <input type="text" id="sn" placeholder="请输入路由器 SN 号" autocomplete="off">
        </div>

        <div class="button-group">
            <button class="btn-calculate" onclick="calculate()">计算密码</button>
            <button class="btn-copy" id="copyBtn" onclick="copyPassword()" disabled>复制密码</button>
        </div>

        <div class="result" id="result">
            <div class="result-label">SSH 密码：</div>
            <div class="result-value" id="password"></div>
        </div>

                1. 访问路由器管理页面 <a href="http://192.168.31.1" target="_blank">192.168.31.1</a><br>
                2. 登录后，在主界面右下角找到 SN 号（部分型号可能位置不一致）<br>
                3. 复制 SN 号粘贴到上方输入框，点击"计算密码"即可获得 SSH 密码

    <div class="toast" id="toast">已复制到剪贴板</div>

    <script>
        const salt = {
            r1d: 'A2E371B0-B34B-48A5-8C40-A7133F3B5D88',
            others: 'd44fb0960aa0-a5e6-4a30-250f-6d2df50a'
        };

        function getSalt(sn) {
            if (sn.indexOf('/') === -1) {
                return salt.r1d;
            } else {
                return swapSalt(salt.others);
            }
        }

        function swapSalt(saltStr) {
            return saltStr.split('-').reverse().join('-');
        }

        function getPassword(sn) {
            const saltValue = getSalt(sn);
            const combined = sn + saltValue;
            const hash = md5(combined);
            return hash.substring(0, 8);
        }

        function calculate() {
            const snInput = document.getElementById('sn');
            const sn = snInput.value.trim();
            
            if (!sn) {
                alert('请输入路由器 SN 号');
                snInput.focus();
                return;
            }

            const password = getPassword(sn);
            
            document.getElementById('password').textContent = password;
            document.getElementById('result').classList.add('show');
            document.getElementById('copyBtn').disabled = false;
        }

        function copyPassword() {
            const password = document.getElementById('password').textContent;
            
            navigator.clipboard.writeText(password).then(() => {
                const toast = document.getElementById('toast');
                toast.classList.add('show');
                
                setTimeout(() => {
                    toast.classList.remove('show');
                }, 2000);
            }).catch(err => {
                const textArea = document.createElement('textarea');
                textArea.value = password;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                
                const toast = document.getElementById('toast');
                toast.classList.add('show');
                
                setTimeout(() => {
                    toast.classList.remove('show');
                }, 2000);
            });
        }

        document.getElementById('sn').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                calculate();
            }
        });
    </script>
